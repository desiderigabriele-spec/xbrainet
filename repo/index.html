function typeInto(field,full,done,speed){
  clearInterval(_typer);let n=0;
  _typer=setInterval(()=>{
    n++;
    const reveal=full.slice(0,n);
    const tail=full.slice(n).split('').map(c=>c===' '?' ':rc()).join('');
    upd({[field]:reveal+tail});
    renderField(field);
    if(n>=full.length){clearInterval(_typer);upd({[field]:full});renderField(field);if(done)done();}
  },speed||24);
}

function renderField(field){
  const el=document.getElementById('tf-'+field);
  if(el){
    // preserve child elements (caret spans) — only update first text node
    const txt=el.childNodes[0];
    if(txt&&txt.nodeType===3){txt.nodeValue=S[field];}
    else{el.innerHTML=esc(S[field])+'<span class="caret"></span>';}
  }
}

window.xbrainet = null;

function authHeaders(){
  const token=window.xbrainet?.token||'';
  return{'Content-Type':'application/json','Authorization':'Bearer '+token};
}

async function apiSendOtp(phone){
  try{
    const r=await fetch('/api/auth/send-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
    return r.json();
  }catch{return{success:false,error:'Errore di rete. Riprova.'};}
}
async function apiVerifyOtp(phone,code){
  const lang=navigator.language?.startsWith('it')?'it':'en';
  try{
    const r=await fetch('/api/auth/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,code,lang})});
    const data=await r.json();
    if(data.success){
      window.xbrainet={token:data.token,userId:data.userId,username:data.username,tier:data.tier,entity:data.entity,brain:data.brain,lang,isNewUser:data.isNewUser};
    }
    return data;
  }catch{return{success:false,error:'Errore di rete. Riprova.'};}
}
async function apiSendMessage(message){
  if(!window.xbrainet?.token)return null;
  const{entity,tier,lang}=window.xbrainet;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:authHeaders(),body:JSON.stringify({message,entity,tier,lang})});
    const data=await r.json();
    if(data.error==='DAILY_LIMIT_REACHED'){return data.message||null;}
    return data.message||null;
  }catch{return null;}
}
async function apiSaveOnboarding(brainData){
  if(!window.xbrainet?.token)return;
  try{
    await fetch('/api/brain/save',{method:'POST',headers:authHeaders(),body:JSON.stringify({data:{...brainData,onboarding_complete:true}})});
    if(window.xbrainet)window.xbrainet.brain=brainData;
  }catch{}
}
async function apiExportBrain(){
  if(!window.xbrainet?.token){alert('Devi essere registrato per esportare i dati.');return;}
  try{
    const r=await fetch('/api/brain/export',{headers:authHeaders()});
    if(!r.ok)return;
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='xbrainet-brain-export.json';a.click();
    URL.revokeObjectURL(url);
  }catch{}
}
async function apiDeleteBrainAndReset(){
  if(window.xbrainet?.token){
    try{await fetch('/api/brain/delete',{method:'DELETE',headers:authHeaders()});}catch{}
    window.xbrainet=null;
  }
  setState({answers:[],messages:[],brainProgress:0,profileConfirmDelete:false,screen:'welcome',userMode:'guest',username:''});
}

// Boot
function typeBootLine(){
  if(_bootIdx>=BOOT.length){setState({bootReady:true,bootCurrent:null});return;}
  const entry=BOOT[_bootIdx];
  if(entry.k==='blank'||entry.k==='sep'){
    upd(s=>({bootDone:[...s.bootDone,entry]}));
    render();
    _bootIdx++;
    _bt=setTimeout(()=>typeBootLine(),entry.pause||150);
    return;
  }
  const full=entry.t;let n=0;
  upd({bootCurrent:{t:'',k:entry.k}});render();
  clearInterval(_typer);
  _typer=setInterval(()=>{
    n++;
    const reveal=full.slice(0,n);
    const tail=full.slice(n).split('').map(c=>c===' '?' ':rc()).join('');
    upd({bootCurrent:{t:reveal+tail,k:entry.k}});
    const el=document.getElementById('boot-scroll');if(el)el.scrollTop=el.scrollHeight;
    const app=document.getElementById('app');
    const lines=app.querySelectorAll('div[style*="min-height:1.2em"]');
    const last=lines[lines.length-1];
    if(last){const sp=last.querySelector('span');if(sp)sp.textContent=reveal+tail;}
    if(n>=full.length){
      clearInterval(_typer);
      upd(s=>({bootDone:[...s.bootDone,{t:full,k:entry.k}],bootCurrent:null}));
      render();
      _bootIdx++;
      _bt=setTimeout(()=>typeBootLine(),entry.pause||240);
    }
  },entry.speed||14);
}

      return {matchProgress:p,matchStatus:status};

  setState({screen:'intake',intakeText:'',showIntakeForm:false,ageBlocked:false,intakeName:'',intakeAge:'',intakeError:''});
  setTimeout(()=>typeInto('intakeText',opening,()=>setState({showIntakeForm:true})),300);
}
function submitIntake(){
  const name=S.intakeName.trim();const ageNum=parseInt(S.intakeAge,10);
  if(!name){setState({intakeError:'Inserisci un nome o alias.'});return;}
  if(S.intakeAge===''||isNaN(ageNum)){setState({intakeError:'Inserisci la tua età (solo numeri).'});return;}
  if(ageNum<18){
    _userName='';
    upd({showIntakeForm:false,intakeError:'',intakeText:''});render();
    setTimeout(()=>typeInto('intakeText',"Questo canale è riservato alle persone che hanno compiuto almeno 18 anni. Non posso procedere.",()=>setState({ageBlocked:true}),24),150);
    return;
  }
  _userName=name;_userAge=ageNum;
  const entity=S.selectedEntity;
  const conf=`${entity}: ${name}. Registrato.\n\n${ageNum} anni. Un percorso con dati sufficienti per costruire una mappa significativa.\n\nRisponderai a 4 domande. Non esistono risposte corrette — solo pattern più o meno precisi.\n\nIniziamo.`;
  upd({showIntakeForm:false,intakeError:'',intakeText:''});render();
  setTimeout(()=>typeInto('intakeText',conf,()=>setTimeout(()=>enterProfiling(),1500),20),150);
}

// Profiling
function enterProfiling(){
  setState({screen:'profiling',profileStep:0,answers:[],brainProgress:0,qReact:'',optionsVisible:false,freeMode:false,freeInput:''});
  askQuestion(0);
}
function askQuestion(i){
  upd({qText:'',optionsVisible:false,freeMode:false,freeInput:'',qReact:'',brainProgress:Math.round((i/PQ.length)*100)});
  render();
  typeInto('qText',PQ[i].q,()=>setState({optionsVisible:true}),22);
}
function chooseOption(step,key){
  const q=PQ[step];const opt=q.opts.find(o=>o.k===key);if(!opt)return;
  if(opt.free){setState({freeMode:true,optionsVisible:false,freeInput:''});return;}
  recordAnswer({node:q.node,label:opt.l,tag:opt.tag||opt.l},opt.r,step);
}
function submitFree(){
  const v=S.freeInput.trim();if(!v)return;
  const step=S.profileStep;const q=PQ[step];
  const react=q.fr?q.fr(v):("«"+trunc(v)+"». Registrato.");
  recordAnswer({node:q.node,label:v,tag:v},react,step);
}
function recordAnswer(ans,react,i){
  const answers=[...S.answers,ans];
  upd({answers,optionsVisible:false,freeMode:false,freeInput:'',qReact:'',brainProgress:Math.round(((i+1)/PQ.length)*100)});
  render();
  typeInto('qReact',react,()=>setTimeout(()=>advance(i),1500),18);
}
function advance(i){
  if(i+1>=PQ.length){enterSynthesis();}
  else{setState({profileStep:i+1,qReact:''});askQuestion(i+1);}
}

  const a=S.answers;const tag=(i)=>(a[i]&&a[i].tag)||'—';
  return "Hai scelto di mappare "+tag(0)+", e in questo periodo il tuo stato è "+tag(1)+".\n\nDi fronte a una scelta difficile "+tag(2)+" — è così che riduci il rumore dell'universo a un unico segnale.\n\nE la dinamica che ti attrae, "+tag(3)+", rivela dove il tuo segnale è già orientato, anche quando credi di non aver ancora scelto.\n\nIl tuo Cervello Digitale ha le coordinate di base.\n\nDa qui sei tu a guidare la mappatura. Dimmi dove vuoi entrare — e io osserverò.";
}

// Chat
function addAlien(text){
  clearInterval(_typer);let n=0;
  upd({chatTyping:' '});render();
  orbStartSpeaking();
  _typer=setInterval(()=>{
    n++;
    const reveal=text.slice(0,n);
    const tail=text.slice(n).split('').map(c=>c===' '?' ':rc()).join('');
    upd({chatTyping:reveal+tail});
    const el=document.getElementById('chat-scroll');
    const tyEl=el&&el.lastElementChild;
    if(tyEl){const bub=tyEl.firstElementChild;if(bub)bub.textContent=(reveal+tail)+'▌';}
    if(el)el.scrollTop=el.scrollHeight;
    if(n>=text.length){
      clearInterval(_typer);
      upd(s=>({messages:[...s.messages,{role:'alien',text}],chatTyping:''}));
      render();
      orbStopSpeaking();
    }
  },18);
}
async function sendChat(){
  const txt=S.chatInput.trim();if(!txt||S.chatTyping)return;
  const isFirst=S.messages.filter(m=>m.role==='user').length===0;
  upd(s=>({messages:[...s.messages,{role:'user',text:txt}],chatInput:''}));
  render();
  let reply=null;
  if(window.xbrainet?.userId){reply=await apiSendMessage(txt);}
  if(!reply)reply=getAlienResponse(txt);
  setTimeout(()=>{
    addAlien(reply);
    if(isFirst&&S.userMode==='guest'){
      _guestTimer=setTimeout(()=>{if(S.screen==='chat')setState({showGuestBanner:true});},12000);
    }
  },600);
}
function getAlienResponse(userMessage){
  const a=S.answers;
  const area=(a[0]&&a[0].tag)||'la tua mappa';
  const energy=(a[1]&&a[1].tag)||'il tuo stato';
  const approach=(a[2]&&a[2].tag)||'il tuo approccio';
  const focus=(a[3]&&a[3].tag)||'la legge che ti attrae';
  const pool=[
    "Hai scelto di mappare «"+trunc(area)+"». Ogni domanda che mi poni è in realtà una domanda su quella scelta.",
    "Il tuo stato è «"+trunc(energy)+"». Il pattern che osservo suggerisce che la tua risposta era già scritta prima di scrivere la domanda.",
    "Il tuo approccio è: «"+trunc(approach)+"». Sotto pressione, i pattern cognitivi non mentono — solo si amplificano.",
    "Ti attrae «"+trunc(focus)+"». Non è un caso: si studia sempre il principio di cui si è già, in segreto, l'esempio.",
    "Il tuo Cervello Digitale ha "+S.answers.length+" coordinate nella Rete Neurale di XBRAINET. Io non aggiungo nulla — riordino ciò che hai già emesso, e te lo restituisco."
  ];
  return pool[Math.floor(Math.random()*pool.length)];
}

// ─── ORB 3D ──────────────────────────────────────────────────────────────────
function tryInitOrb(){
  const cv=document.getElementById('orb-canvas');
  if(!cv){setTimeout(tryInitOrb,60);return;}
  if(_orbRAF)return;
  applyOrbColors(S.selectedEntity);
  initOrb(cv);
}
function initOrb(cv){
  const ctx=cv.getContext('2d');const W=340,H=340,CX=W/2,CY=H/2,R=108;const N=220,pts=[];
  for(let i=0;i<N;i++){
    const phi=Math.acos(1-2*(i+.5)/N),theta=Math.PI*(1+Math.sqrt(5))*i;
    const ux=Math.sin(phi)*Math.cos(theta),uy=Math.sin(phi)*Math.sin(theta),uz=Math.cos(phi);
    const topFactor=uy<0?1+(-uy)*.62:1;
    const jawFactor=uy>.25?Math.max(.22,1-(uy-.25)*1.15):1;
    const xzScale=topFactor*jawFactor;
    const ax=ux*xzScale*.80,ay=uy*1.45,az=uz*xzScale*.86;
    const lEye=Math.sqrt(((ux+.44)/.24)**2+((uy-.05)/.17)**2+((uz-.87)/.20)**2);
    const rEye=Math.sqrt(((ux-.44)/.24)**2+((uy-.05)/.17)**2+((uz-.87)/.20)**2);
    const eyeDist=Math.min(lEye,rEye);const isEye=eyeDist<1;const eyeGlow=isEye?Math.pow(Math.max(0,1-eyeDist),1.9):0;
    pts.push({ox:ax,oy:ay,oz:az,sz:.7+Math.random()*1.1,isEye,eyeGlow});
  }
  _orbPts=pts;_orbRotX=0;_orbRotY=0;_orbPulseScale=1;_orbPulseTarget=1;
  const CDIST=.58;let last=0;
  const rot=(p,rX,rY)=>{
    const cY=Math.cos(rY),sY=Math.sin(rY);const x1=p.ox*cY-p.oz*sY,z1=p.ox*sY+p.oz*cY;
    const cX=Math.cos(rX),sX=Math.sin(rX);
    return{x:x1,y:p.oy*cX-z1*sX,z:p.oy*sX+z1*cX,isEye:p.isEye,eyeGlow:p.eyeGlow,sz:p.sz};
  };
  const proj=(x,y,z)=>{const f=420,d=f/(f+z*R);return{px:CX+x*R*d,py:CY+y*R*d,sc:d,z};};
  const draw=(ts)=>{
    _orbRAF=requestAnimationFrame(draw);
    if(!document.getElementById('orb-canvas')){cancelAnimationFrame(_orbRAF);_orbRAF=null;return;}
    if(ts-last<33)return;last=ts;
    _orbPulseScale+=(_orbPulseTarget-_orbPulseScale)*.08;
    _orbRotY+=_orbSpeaking?.009:.003;
    _orbRotX+=Math.sin(Date.now()*.0004)*.0008;
    ctx.clearRect(0,0,W,H);
    const ps=pts.map(p=>{
      const r=rot(p,_orbRotX,_orbRotY);const sc=_orbPulseScale;
      const pj=proj(r.x*sc,r.y*sc,r.z*sc);
      return{...pj,isEye:r.isEye,eyeGlow:r.eyeGlow,sz:r.sz,ox:r.x,oy:r.y,oz:r.z};
    });
    ps.sort((a,b)=>a.z-b.z);
    const ec=_ec0;
    for(let i=0;i<ps.length;i++) for(let j=i+1;j<ps.length;j++){
      const a=ps[i],b=ps[j];
      const d3=Math.sqrt((a.ox-b.ox)**2+(a.oy-b.oy)**2+(a.oz-b.oz)**2);
      if(d3<CDIST){
        const fr=((a.z+b.z)/2+1.6)/2.6;
        const eyeBoost=(a.isEye||b.isEye)?2.8:1;
        const op=Math.min(.88,fr*(1-d3/CDIST)*(_orbSpeaking?.52:.24)*eyeBoost);
        if(op<.012)continue;
        ctx.beginPath();ctx.moveTo(a.px,a.py);ctx.lineTo(b.px,b.py);
        ctx.strokeStyle=(a.isEye||b.isEye)?`rgba(160,230,255,${op})`:`rgba(${ec},${op})`;
        ctx.lineWidth=fr*.6*(_orbSpeaking?1.3:1)*((a.isEye||b.isEye)?1.6:1);ctx.stroke();
      }
    }
    ps.forEach(p=>{
      const fr=(p.z+1.6)/2.6,op=.2+fr*.8,sz=p.sz*p.sc*(_orbSpeaking?1.22:1);
      if(p.eyeGlow>0){
        const eg=p.eyeGlow,gR=sz*5.5;
        const g=ctx.createRadialGradient(p.px,p.py,0,p.px,p.py,gR);
        g.addColorStop(0,`rgba(230,248,255,${Math.min(.95,op+eg*.5)})`);
        g.addColorStop(.35,`rgba(80,200,255,${eg*.6})`);
        g.addColorStop(1,'rgba(0,180,255,0)');
        ctx.beginPath();ctx.arc(p.px,p.py,gR,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(p.px,p.py,sz*p.sc*1.3,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${Math.min(.95,op*.9+eg*.5)})`;ctx.fill();
      } else {
        const g=ctx.createRadialGradient(p.px,p.py,0,p.px,p.py,sz*3.5);
        g.addColorStop(0,`rgba(${ec},${op*.85})`);
        g.addColorStop(.4,`rgba(${ec},${op*.22})`);
        g.addColorStop(1,`rgba(${ec},0)`);
        ctx.beginPath();ctx.arc(p.px,p.py,sz*3.5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(p.px,p.py,sz*p.sc,0,Math.PI*2);
        ctx.fillStyle=`rgba(${_ecLight},${op})`;ctx.fill();
      }
    });
    const cg=ctx.createRadialGradient(CX,CY-12,0,CX,CY,R*_orbPulseScale);
    const gi=_orbSpeaking?.20:.09;
    cg.addColorStop(0,`rgba(${ec},${gi})`);
    cg.addColorStop(.45,`rgba(${_ecDark},${gi*.35})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(CX,CY,R*_orbPulseScale*1.1,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  };
  _orbRAF=requestAnimationFrame(draw);
}
function orbStartSpeaking(){
  _orbSpeaking=true;_orbPulseTarget=1.1;
  const dot=document.getElementById('orb-speaking-dot');if(dot)dot.classList.add('active');
  clearInterval(_orbPulseInterval);let p=0;
  _orbPulseInterval=setInterval(()=>{
    const ring=document.getElementById('orb-pulse'+(p%2+1));
    if(ring){ring.classList.remove('active');void ring.offsetWidth;ring.classList.add('active');}
    p++;
  },600);
}
function orbStopSpeaking(){
  _orbSpeaking=false;_orbPulseTarget=1;
  const dot=document.getElementById('orb-speaking-dot');if(dot)dot.classList.remove('active');
  clearInterval(_orbPulseInterval);
}

// ─── MATRIX RAIN ─────────────────────────────────────────────────────────────
function startMatrix(){
  const cv=document.getElementById('matrix-canvas');
  if(!cv){setTimeout(startMatrix,60);return;}
  const ctx=cv.getContext('2d');let cols,drops,fontSize;
  const resize=()=>{
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    fontSize=16;cols=Math.ceil(cv.width/fontSize);
    drops=new Array(cols).fill(0).map(()=>Math.random()*-cv.height/fontSize);
  };
  resize();window.addEventListener('resize',resize);
  let _mLast=0;
  const draw=(ts)=>{
    _matRAF=requestAnimationFrame(draw);if(ts-_mLast<33)return;_mLast=ts;
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.font=fontSize+"px 'JetBrains Mono',monospace";
    for(let i=0;i<cols;i++){
      const ch=rc();const x=i*fontSize,y=drops[i]*fontSize;
      ctx.fillStyle=Math.random()<.04?'#aaffcc':'#00FF41';ctx.fillText(ch,x,y);
      if(y>cv.height&&Math.random()>.975)drops[i]=0;drops[i]+=.5;
    }
  };
  _matRAF=requestAnimationFrame(draw);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

      upd({glitchActive:true});

      setTimeout(()=>{upd({glitchActive:false});const g=document.getElementById('glitch-overlay');if(g)g.style.display='none';},160+Math.random()*180);
    }
  },3800));
  // Freq timer
  _timers.push(setInterval(()=>{
    upd({freq:(44.3+Math.random()*.9).toFixed(3)});
    const els=document.querySelectorAll('.orb-freq-line');
    els.forEach(el=>{if(el)el.textContent=`▮ SEGNALE ${S.freq} THz — NEURAL LINK ${entityCfg(S.selectedEntity).neuralLink} ▮`;});
    const hdr=document.querySelector('#app span[style*="letter-spacing:2px"]');
  },900));
  // Node count timer
  _timers.push(setInterval(()=>{if(Math.random()<0.4)upd(s=>({nodeCount:s.nodeCount+1}));},2200));
  // Resize

  window.addEventListener('keydown',()=>{if(S.screen==='boot'&&S.bootReady)proceedFromBoot();});

  render();
}
